<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Assassin's Creed Universe Guide</title>

  <style>
    :root {
      --bg: #070b10;
      --panel: rgba(7, 11, 16, 0.94);
      --line: rgba(255, 255, 255, 0.14);
      --line-strong: rgba(255, 255, 255, 0.25);
      --text: #ffffff;
      --muted: #aeb8c7;
      --active: #ffffff;
      --active-text: #071018;
      --radius: 10px;

      --color-main-series: #D43144;
      --color-spin-offs: #28E989;
      --color-books: #08D9C2;
      --color-nonref-books: #9DE6FF;
      --color-video: #FFA472;
      --color-comics: #D79BDB;
      --color-upcoming: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    button,
    label,
    select {
      font: inherit;
    }

    button,
    select {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.075);
      color: var(--text);
      border-radius: var(--radius);
      padding: 8px 11px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
    }

    select {
      min-height: 34px;
      padding-right: 32px;
      background-color: rgba(255, 255, 255, 0.075);
    }

    select option {
      color: #000000;
      background: #ffffff;
    }

    button:hover,
    select:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.13);
    }

    button:active {
      transform: translateY(1px);
    }

    button.active {
      background: var(--active);
      color: var(--active-text);
      border-color: var(--active);
    }

    .topbar {
      position: relative;
      z-index: 100;
      flex: 0 0 auto;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 220px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
    }

    .subtitle {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      flex: 1;
      justify-content: flex-end;
      align-items: center;
      min-width: 0;
    }

    .toolbar-scroll {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 2px;
    }

    .toolbar-section {
      display: flex;
      gap: 6px;
      align-items: center;
      flex: 0 0 auto;
    }

    .section-divider {
      width: 1px;
      height: 28px;
      background: var(--line);
      flex: 0 0 auto;
    }

    .check-pill {
      --pill-color: var(--active);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.075);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .check-pill:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.13);
    }

    .check-pill input {
      margin: 0;
      accent-color: #ffffff;
    }

    .check-pill.is-on {
      background: var(--pill-color);
      color: #071018;
      border-color: var(--pill-color);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    }

    .check-pill.is-on input {
      accent-color: #071018;
    }

    .check-pill[data-filter-color="spin-offs"] {
      --pill-color: var(--color-spin-offs);
    }

    .check-pill[data-filter-color="books"] {
      --pill-color: var(--color-books);
    }

    .check-pill[data-filter-color="nonref-books"] {
      --pill-color: var(--color-nonref-books);
    }

    .check-pill[data-filter-color="video"] {
      --pill-color: var(--color-video);
    }

    .check-pill[data-filter-color="comics"] {
      --pill-color: var(--color-comics);
    }

    .check-pill[data-filter-color="upcoming"] {
      --pill-color: var(--color-upcoming);
    }

    .check-pill[data-filter-color="upcoming"].is-on {
      background: #FFFFFF;
      color: #071018;
      border-color: #000000;
    }

    .fixed-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--color-main-series);
      background: var(--color-main-series);
      color: #ffffff;
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 13px;
      line-height: 1;
      user-select: none;
      white-space: nowrap;
      opacity: 0.98;
    }

    .fixed-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ffffff;
      flex: 0 0 auto;
    }

    .zoom-display {
      min-width: 58px;
      text-align: center;
      cursor: default;
    }

    .viewer {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.045), transparent 34%),
        #05080d;
      touch-action: none;
      user-select: none;
      cursor: grab;
      padding: 24px;
    }

    .viewer.mode-zoom {
      cursor: zoom-in;
    }

    .viewer.is-panning {
      cursor: grabbing;
    }

    .viewer.is-zoom-dragging {
      cursor: ns-resize;
    }

    .guide-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3000 / 6466;
      margin: 0 auto;
      background: #070b10;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .guide-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hidden {
      display: none !important;
    }

    .layer-base { z-index: 0; }
    .layer-nonref-books { z-index: 3; }
    .layer-spin-offs { z-index: 4; }
    .layer-books { z-index: 5; }
    .layer-video { z-index: 6; }
    .layer-upcoming { z-index: 7; }
    .layer-comics { z-index: 8; }

    .corner-panel {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 60;
      display: flex;
      gap: 8px;
      align-items: center;
      max-width: calc(100vw - 32px);
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: rgba(7, 11, 16, 0.78);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 70;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(7, 11, 16, 0.9);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
        padding: 10px;
      }

      .brand {
        width: 100%;
        min-width: 0;
      }

      .title,
      .subtitle {
        white-space: normal;
      }

      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }

      .toolbar-scroll {
        width: 100%;
      }

      button,
      select,
      .check-pill,
      .fixed-pill {
        min-height: 36px;
        padding: 9px 11px;
        font-size: 12px;
      }

      .section-divider {
        height: 30px;
      }

      .viewer {
        padding: 14px;
      }

      .corner-panel {
        left: 10px;
        right: 10px;
        bottom: 10px;
        justify-content: center;
        font-size: 11px;
      }

      .toast {
        left: 10px;
        right: 10px;
        bottom: 52px;
        text-align: center;
      }
    }

    @media (max-width: 560px) {
      .toolbar-section.view-extra {
        display: none;
      }

      .fixed-pill {
        display: none;
      }

      .corner-panel {
        display: none;
      }
    }
  </style>
</head>

        <div class="section-divider"></div>

          <label class="check-pill" data-filter-color="books">

          <label class="check-pill" data-filter-color="nonref-books">

          <label class="check-pill" data-filter-color="comics">
            <input type="checkbox" data-layer="comics" checked>
            <span data-i18n="comics">Comics</span>
          </label>

          <label class="check-pill" data-filter-color="video">

            <span data-i18n="video">Video</span>
          </label>

          <label class="check-pill" data-filter-color="upcoming">
            <input type="checkbox" data-layer="upcoming" checked>
            <span data-i18n="upcoming">Upcoming</span>
          </label>
        </div>

        <div class="toolbar-section">
          <button id="reset-filters" type="button" data-i18n="resetFilters">Reset Filters</button>
          <button id="share-view" type="button" data-i18n="share">Share</button>
        </div>

    </div>

  <main id="viewer" class="viewer mode-pan">

      <img class="layer-upcoming filter-layer" data-layer-name="upcoming" data-src="assets/layers/07-upcoming.png" alt="Upcoming" decoding="async">
      <img class="layer-comics filter-layer" data-layer-name="comics" data-src="assets/layers/08-comics.png" alt="Comics" decoding="async">

        hint: '드래그하여 이동 · Ctrl + 휠 / 핀치로 확대 · 마우스 가운데 버튼으로 이동',
        copied: '링크가 복사되었습니다',
        copyFallback: '이 링크를 복사하세요:'
      },

      it: {
        title: 'Guida all’universo di Assassin’s Creed',
        subtitle: 'Guida interattiva',
        fitWidth: 'Adatta alla larghezza',
        fitHeight: 'Adatta all’altezza',
        resetView: 'Reimposta vista',
        panMode: 'Sposta',
        zoomMode: 'Zoom trascinando',
        mainFixed: 'Serie principale',
        spinOffs: 'Spin-off',
        books: 'Libri',
        nonfiction: 'Saggistica',
        comics: 'Fumetti',
        video: 'Video',
        upcoming: 'In arrivo',
        resetFilters: 'Reimposta filtri',
        share: 'Condividi',
        hint: 'Trascina per spostare · Ctrl + rotellina / pinch per zoomare · Tasto centrale per spostare',
        copied: 'Link copiato',
        copyFallback: 'Copia questo link:'
      },

      pl: {
        title: 'Przewodnik po uniwersum Assassin’s Creed',
        subtitle: 'Interaktywny przewodnik',
        fitWidth: 'Dopasuj do szerokości',
        fitHeight: 'Dopasuj do wysokości',
        resetView: 'Resetuj widok',
        panMode: 'Przesuń',
        zoomMode: 'Zoom przez przeciąganie',
        mainFixed: 'Główna seria',
        spinOffs: 'Spin-offy',
        books: 'Książki',
        nonfiction: 'Literatura faktu',
        comics: 'Komiksy',
        video: 'Wideo',
        upcoming: 'Nadchodzące',
        resetFilters: 'Resetuj filtry',
        share: 'Udostępnij',
        hint: 'Przeciągnij, aby przesunąć · Ctrl + kółko / gest szczypania, aby powiększyć · Środkowy przycisk myszy do przesuwania',
        copied: 'Link skopiowany',
        copyFallback: 'Skopiuj ten link:'
      },

      tr: {
        title: 'Assassin’s Creed evren rehberi',
        subtitle: 'İnteraktif rehber',
        fitWidth: 'Genişliğe sığdır',
        fitHeight: 'Yüksekliğe sığdır',
        resetView: 'Görünümü sıfırla',
        panMode: 'Taşı',
        zoomMode: 'Sürükleyerek yakınlaştır',
        mainFixed: 'Ana seri',
        spinOffs: 'Yan oyunlar',
        books: 'Kitaplar',
        nonfiction: 'Kurgu dışı',
        comics: 'Çizgi romanlar',
        video: 'Video',
        upcoming: 'Yakında',
        resetFilters: 'Filtreleri sıfırla',
        share: 'Paylaş',
        hint: 'Taşımak için sürükle · Ctrl + tekerlek / kıstırma ile yakınlaştır · Orta fare tuşu ile taşı',
        copied: 'Bağlantı kopyalandı',
        copyFallback: 'Bu bağlantıyı kopyala:'
      }
    };

    const viewer = document.querySelector('#viewer');
    const guideWrap = document.querySelector('#guide-wrap');
    const baseLayer = document.querySelector('#base-layer');
    const toast = document.querySelector('#toast');

    const languageSelect = document.querySelector('#language-select');
    const checkboxes = document.querySelectorAll('input[type="checkbox"][data-layer]');
    const filterLayers = document.querySelectorAll('.filter-layer');

    const zoomOutButton = document.querySelector('#zoom-out');
    const zoomInButton = document.querySelector('#zoom-in');
    const zoomDisplayButton = document.querySelector('#zoom-display');
    const fitWidthButton = document.querySelector('#fit-width');
    const fitHeightButton = document.querySelector('#fit-height');
    const resetViewButton = document.querySelector('#reset-view');
    const resetFiltersButton = document.querySelector('#reset-filters');
    const shareButton = document.querySelector('#share-view');
    const modePanButton = document.querySelector('#mode-pan');
    const modeZoomButton = document.querySelector('#mode-zoom');

    let baseGuideWidth = 1000;
    let saveTimer = null;
    let toastTimer = null;

    const state = {
      lang: 'en',
      mode: 'pan',
      zoom: 1,
      filters: {
        'spin-offs': true,
        books: true,
        'nonref-books': true,
        comics: true,
        video: true,
        upcoming: true
      }
    };

    const pointers = new Map();

    let drag = {
      active: false,
      pointerId: null,
      startX: 0,
      startY: 0,
      startScrollLeft: 0,
      startScrollTop: 0,
      startZoom: 1,
      middlePan: false
    };

    let pinch = {
      active: false,
      startDistance: 0,
      startZoom: 1
    };

    function isMobileLayout() {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getMaxZoom() {
      return isMobileLayout() ? 4 : 6;
    }

    function getGuideWidth() {
      return baseGuideWidth * state.zoom;
    }

    function computeBaseGuideWidth() {
      const padding = isMobileLayout() ? 28 : 48;
      baseGuideWidth = Math.max(280, viewer.clientWidth - padding);
    }

    function applyZoom() {
      state.zoom = clamp(state.zoom, 0.35, getMaxZoom());
      guideWrap.style.width = `${getGuideWidth()}px`;
      zoomDisplayButton.textContent = `${Math.round(state.zoom * 100)}%`;
    }

    function saveState() {
      window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => {
        const saved = {
          lang: state.lang,
          mode: state.mode,
          zoom: state.zoom,
          filters: state.filters
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      }, 120);
    }

    function getPointInGuide(clientX, clientY) {
      const viewerRect = viewer.getBoundingClientRect();
      const width = guideWrap.offsetWidth;
      const height = guideWrap.offsetHeight;

      const viewX = clientX - viewerRect.left;
      const viewY = clientY - viewerRect.top;

      const x = viewer.scrollLeft + viewX - guideWrap.offsetLeft;
      const y = viewer.scrollTop + viewY - guideWrap.offsetTop;

      return {
        xRatio: clamp(x / Math.max(1, width), 0, 1),
        yRatio: clamp(y / Math.max(1, height), 0, 1),
        viewX,
        viewY
      };
    }

    function setZoomAt(clientX, clientY, nextZoom) {
      const point = getPointInGuide(clientX, clientY);

      state.zoom = clamp(nextZoom, 0.35, getMaxZoom());
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = guideWrap.offsetLeft + point.xRatio * guideWrap.offsetWidth - point.viewX;
        viewer.scrollTop = guideWrap.offsetTop + point.yRatio * guideWrap.offsetHeight - point.viewY;
        saveState();
      });
    }

    function setZoomAtCenter(nextZoom) {
      const rect = viewer.getBoundingClientRect();
      setZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, nextZoom);
    }

    function fitWidth() {
      computeBaseGuideWidth();
      state.zoom = 1;
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = Math.max(0, (viewer.scrollWidth - viewer.clientWidth) / 2);
        viewer.scrollTop = 0;
        saveState();
      });
    }

    function fitHeight() {
      computeBaseGuideWidth();

      const availableHeight = Math.max(200, viewer.clientHeight - 32);
      const heightAtZoomOne = baseGuideWidth * (BASE_HEIGHT / BASE_WIDTH);

      state.zoom = clamp(availableHeight / heightAtZoomOne, 0.35, getMaxZoom());
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = Math.max(0, (viewer.scrollWidth - viewer.clientWidth) / 2);
        viewer.scrollTop = 0;
        saveState();
      });
    }

    function resetView() {
      state.zoom = 1;
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = Math.max(0, (viewer.scrollWidth - viewer.clientWidth) / 2);
        viewer.scrollTop = 0;
        saveState();
      });
    }

    function setLanguage(lang) {
      if (!BASE_BY_LANG[lang]) {
        lang = 'en';
      }

      state.lang = lang;
      document.documentElement.lang = lang;
      languageSelect.value = lang;

      if (baseLayer.getAttribute('src') !== BASE_BY_LANG[lang]) {
        baseLayer.src = BASE_BY_LANG[lang];
      }

      const dictionary = UI[lang] || UI.en;

      document.querySelectorAll('[data-i18n]').forEach((element) => {
        const key = element.dataset.i18n;

        if (dictionary[key]) {
          element.textContent = dictionary[key];
        }
      });

      saveState();
    }

    function setMode(mode) {
      state.mode = mode;

      viewer.classList.toggle('mode-pan', mode === 'pan');
      viewer.classList.toggle('mode-zoom', mode === 'zoom');

      modePanButton.classList.toggle('active', mode === 'pan');
      modeZoomButton.classList.toggle('active', mode === 'zoom');

      saveState();
    }

    function shouldUnloadHiddenLayers() {
      return isMobileLayout();
    }

    function ensureLayerLoaded(layer) {
      if (!layer.getAttribute('src')) {
        layer.src = layer.dataset.src;
      }
    }

    function unloadLayer(layer) {
      if (shouldUnloadHiddenLayers()) {
        layer.removeAttribute('src');
      }
    }

    function applyFilters() {
      checkboxes.forEach((checkbox) => {
        const key = checkbox.dataset.layer;
        const visible = state.filters[key] !== false;

        checkbox.checked = visible;

        const pill = checkbox.closest('.check-pill');

        if (pill) {
          pill.classList.toggle('is-on', visible);
        }
      });

      filterLayers.forEach((layer) => {
        const key = layer.dataset.layerName;
        const visible = state.filters[key] !== false;

        layer.classList.toggle('hidden', !visible);

        if (visible) {
          ensureLayerLoaded(layer);
        } else {
          unloadLayer(layer);
        }
      });

      saveState();
    }

    function resetFilters() {
      FILTERS.forEach((key) => {
        state.filters[key] = true;
      });

      applyFilters();
    }

    function showToast(message) {
      window.clearTimeout(toastTimer);

      toast.textContent = message;
      toast.classList.add('visible');

      toastTimer = window.setTimeout(() => {
        toast.classList.remove('visible');
      }, 1600);
    }

    function getShareUrl() {
      const url = new URL(window.location.href);

      url.search = '';
      url.searchParams.set('lang', state.lang);

      if (state.mode !== 'pan') {
        url.searchParams.set('mode', state.mode);
      }

      if (Math.abs(state.zoom - 1) > 0.01) {
        url.searchParams.set('zoom', state.zoom.toFixed(2));
      }

      FILTERS.forEach((key) => {
        if (state.filters[key] === false) {
          url.searchParams.set(key, '0');
        }
      });

      return url.toString();
    }

    async function shareView() {
      const url = getShareUrl();
      const dictionary = UI[state.lang] || UI.en;

      try {
        await navigator.clipboard.writeText(url);
        showToast(dictionary.copied);
      } catch (error) {
        window.prompt(dictionary.copyFallback, url);
      }
    }

    function readSavedState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

        if (!saved) {
          return;
        }

        if (BASE_BY_LANG[saved.lang]) {
          state.lang = saved.lang;
        }

        if (saved.mode === 'pan' || saved.mode === 'zoom') {
          state.mode = saved.mode;
        }

        if (typeof saved.zoom === 'number') {
          state.zoom = clamp(saved.zoom, 0.35, getMaxZoom());
        }

        if (saved.filters) {
          FILTERS.forEach((key) => {
            if (typeof saved.filters[key] === 'boolean') {
              state.filters[key] = saved.filters[key];
            }
          });
        }
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function readUrlState() {
      const params = new URLSearchParams(window.location.search);

      const lang = params.get('lang');
      const mode = params.get('mode');
      const zoom = Number(params.get('zoom'));

      if (BASE_BY_LANG[lang]) {
        state.lang = lang;
      }

      if (mode === 'pan' || mode === 'zoom') {
        state.mode = mode;
      }

      if (Number.isFinite(zoom)) {
        state.zoom = clamp(zoom, 0.35, getMaxZoom());
      }

      FILTERS.forEach((key) => {
        if (params.get(key) === '0') {
          state.filters[key] = false;
        }

        if (params.get(key) === '1') {
          state.filters[key] = true;
        }
      });
    }

    function getPointerDistance(items) {
      const a = items[0];
      const b = items[1];

      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    function getPointerCenter(items) {
      const a = items[0];
      const b = items[1];

      return {
        x: (a.clientX + b.clientX) / 2,
        y: (a.clientY + b.clientY) / 2
      };
    }

    function startPinch() {
      const items = Array.from(pointers.values());

      if (items.length < 2) {
        return;
      }

      pinch.active = true;
      pinch.startDistance = getPointerDistance(items);
      pinch.startZoom = state.zoom;
      drag.active = false;

      viewer.classList.remove('is-panning');
      viewer.classList.remove('is-zoom-dragging');
    }

    function stopInteraction(event) {
      if (event && pointers.has(event.pointerId)) {
        pointers.delete(event.pointerId);
      }

      if (drag.active && event && drag.pointerId === event.pointerId) {
        drag.active = false;
        drag.pointerId = null;
        drag.middlePan = false;
      }

      if (pointers.size < 2) {
        pinch.active = false;
      }

      if (pointers.size === 0) {
        viewer.classList.remove('is-panning');
        viewer.classList.remove('is-zoom-dragging');
      }
    }

    viewer.addEventListener('pointerdown', (event) => {
      const isMouse = event.pointerType === 'mouse';
      const isLeftButton = event.button === 0;
      const isMiddleButton = event.button === 1;

      if (isMouse && !isLeftButton && !isMiddleButton) {
        return;
      }

      event.preventDefault();

      viewer.setPointerCapture(event.pointerId);

      pointers.set(event.pointerId, {
        clientX: event.clientX,
        clientY: event.clientY
      });

      if (pointers.size === 2) {
        startPinch();
        return;
      }

      drag.active = true;
      drag.pointerId = event.pointerId;
      drag.startX = event.clientX;
      drag.startY = event.clientY;
      drag.startScrollLeft = viewer.scrollLeft;
      drag.startScrollTop = viewer.scrollTop;
      drag.startZoom = state.zoom;
      drag.middlePan = isMiddleButton;

      viewer.classList.toggle('is-panning', state.mode === 'pan' || drag.middlePan);
      viewer.classList.toggle('is-zoom-dragging', state.mode === 'zoom' && !drag.middlePan);
    });

    viewer.addEventListener('pointermove', (event) => {
      if (!pointers.has(event.pointerId)) {
        return;
      }

      pointers.set(event.pointerId, {
        clientX: event.clientX,
        clientY: event.clientY
      });

      if (pointers.size >= 2 && pinch.active) {
        const items = Array.from(pointers.values()).slice(0, 2);
        const distance = getPointerDistance(items);
        const center = getPointerCenter(items);
        const ratio = distance / Math.max(1, pinch.startDistance);

        setZoomAt(center.x, center.y, pinch.startZoom * ratio);
        return;
      }

      if (!drag.active || drag.pointerId !== event.pointerId) {
        return;
      }

      const deltaX = event.clientX - drag.startX;
      const deltaY = event.clientY - drag.startY;

      if (state.mode === 'pan' || drag.middlePan) {
        viewer.scrollLeft = drag.startScrollLeft - deltaX;
        viewer.scrollTop = drag.startScrollTop - deltaY;
        return;
      }

      const zoomDelta = (deltaX - deltaY) * 0.003;
      setZoomAt(event.clientX, event.clientY, drag.startZoom + zoomDelta);
    });

    viewer.addEventListener('pointerup', stopInteraction);
    viewer.addEventListener('pointercancel', stopInteraction);
    viewer.addEventListener('lostpointercapture', stopInteraction);

    viewer.addEventListener('wheel', (event) => {
      if (event.ctrlKey || event.metaKey) {
        event.preventDefault();

        const zoomFactor = Math.exp(-event.deltaY * 0.001);
        setZoomAt(event.clientX, event.clientY, state.zoom * zoomFactor);
      }
    }, { passive: false });

    viewer.addEventListener('mousedown', (event) => {
      if (event.button === 1) {
        event.preventDefault();
      }
    });

    viewer.addEventListener('auxclick', (event) => {
      if (event.button === 1) {
        event.preventDefault();
      }
    });

    languageSelect.addEventListener('change', () => {
      setLanguage(languageSelect.value);
    });

    checkboxes.forEach((checkbox) => {
      checkbox.addEventListener('change', () => {
        state.filters[checkbox.dataset.layer] = checkbox.checked;
        applyFilters();
      });
    });

    zoomOutButton.addEventListener('click', () => {
      setZoomAtCenter(state.zoom - 0.25);
    });

    zoomInButton.addEventListener('click', () => {
      setZoomAtCenter(state.zoom + 0.25);
    });

    zoomDisplayButton.addEventListener('click', resetView);
    fitWidthButton.addEventListener('click', fitWidth);
    fitHeightButton.addEventListener('click', fitHeight);
    resetViewButton.addEventListener('click', resetView);
    resetFiltersButton.addEventListener('click', resetFilters);
    shareButton.addEventListener('click', shareView);

    modePanButton.addEventListener('click', () => {
      setMode('pan');
    });

    modeZoomButton.addEventListener('click', () => {
      setMode('zoom');
    });

    window.addEventListener('keydown', (event) => {
      const tag = document.activeElement.tagName.toLowerCase();

      if (tag === 'input' || tag === 'button' || tag === 'select') {
        return;
      }

      if (event.key === '+' || event.key === '=') {
        event.preventDefault();
        setZoomAtCenter(state.zoom + 0.25);
      }

      if (event.key === '-') {
        event.preventDefault();
        setZoomAtCenter(state.zoom - 0.25);
      }

      if (event.key === '0') {
        event.preventDefault();
        resetView();
      }

      if (event.key.toLowerCase() === 'f') {
        event.preventDefault();
        fitWidth();
      }

      if (event.key.toLowerCase() === 'h') {
        event.preventDefault();
        fitHeight();
      }

      if (event.key.toLowerCase() === 'z') {
        event.preventDefault();
        setMode(state.mode === 'pan' ? 'zoom' : 'pan');
      }

      if (event.key.toLowerCase() === 'r') {
        event.preventDefault();
        resetFilters();
      }
    });

    window.addEventListener('resize', () => {
      const oldWidth = guideWrap.offsetWidth;
      const oldHeight = guideWrap.offsetHeight;

      const centerX = viewer.scrollLeft + viewer.clientWidth / 2 - guideWrap.offsetLeft;
      const centerY = viewer.scrollTop + viewer.clientHeight / 2 - guideWrap.offsetTop;

      const xRatio = clamp(centerX / Math.max(1, oldWidth), 0, 1);
      const yRatio = clamp(centerY / Math.max(1, oldHeight), 0, 1);

      computeBaseGuideWidth();
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = guideWrap.offsetLeft + xRatio * guideWrap.offsetWidth - viewer.clientWidth / 2;
        viewer.scrollTop = guideWrap.offsetTop + yRatio * guideWrap.offsetHeight - viewer.clientHeight / 2;
      });
    });

    baseLayer.addEventListener('error', () => {
      console.warn(`Base layer not found: ${baseLayer.getAttribute('src')}`);
    });

    filterLayers.forEach((img) => {
      img.addEventListener('error', () => {
        console.warn(`Layer not found: ${img.dataset.src}`);
      });
    });

    readSavedState();
    readUrlState();

    computeBaseGuideWidth();
    applyZoom();
    setLanguage(state.lang);
    setMode(state.mode);
    applyFilters();

    requestAnimationFrame(() => {
      viewer.scrollLeft = Math.max(0, (viewer.scrollWidth - viewer.clientWidth) / 2);
      viewer.scrollTop = 0;
    });
  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Assassin's Creed Universe Guide</title>

  <meta name="description" content="Interactive Assassin's Creed universe guide with games, spin-offs, books, comics, videos and upcoming projects." />
  <meta name="theme-color" content="#070b10" />

  <link rel="canonical" href="https://fingdm.github.io/assassins-creed-guide/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Assassin's Creed Universe Guide" />
  <meta property="og:description" content="Explore the Assassin's Creed universe through games, spin-offs, books, comics, videos and upcoming projects." />
  <meta property="og:image" content="https://fingdm.github.io/assassins-creed-guide/assets/preview.jpg" />
  <meta property="og:url" content="https://fingdm.github.io/assassins-creed-guide/" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Assassin's Creed Universe Guide" />
  <meta name="twitter:description" content="Interactive guide to the Assassin's Creed universe." />
  <meta name="twitter:image" content="https://fingdm.github.io/assassins-creed-guide/assets/preview.jpg" />

  <style>
    :root {
      --bg: #070b10;
      --panel: rgba(7, 11, 16, 0.94);
      --panel-solid: #0b1119;
      --line: rgba(255, 255, 255, 0.14);
      --line-strong: rgba(255, 255, 255, 0.25);
      --text: #ffffff;
      --muted: #aeb8c7;
      --active: #ffffff;
      --active-text: #071018;
      --radius: 10px;

      --color-main-series: #D43144;
      --color-spin-offs: #28E989;
      --color-books: #08D9C2;
      --color-nonref-books: #9DE6FF;
      --color-video: #FFA472;
      --color-comics: #D79BDB;
      --color-upcoming: #FFFFFF;
      --color-filters-mobile: #FFD84D;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    button,
    label,
    select,
    summary {
      font: inherit;
    }

    button,
    select,
    summary {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.075);
      color: var(--text);
      border-radius: var(--radius);
      padding: 8px 11px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.08s ease, opacity 0.15s ease;
    }

    select {
      min-height: 34px;
      padding-right: 32px;
      background-color: rgba(255, 255, 255, 0.075);
    }

    select option {
      color: #000000;
      background: #ffffff;
    }

    button:hover,
    select:hover,
    summary:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.13);
    }

    button:active,
    summary:active {
      transform: translateY(1px);
    }

    button.active {
      background: var(--active);
      color: var(--active-text);
      border-color: var(--active);
    }

    a {
      color: #9DE6FF;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .topbar {
      position: relative;
      z-index: 120;
      flex: 0 0 auto;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 240px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
    }

    .subtitle {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .utilitybar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    .select-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .select-wrap span {
      flex: 0 0 auto;
    }

    .menu {
      position: relative;
      flex: 0 0 auto;
    }

    .menu summary {
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .menu summary::-webkit-details-marker {
      display: none;
    }

    .menu summary::after {
      content: "▾";
      font-size: 11px;
      opacity: 0.75;
    }

    .menu[open] summary {
      background: var(--active);
      color: var(--active-text);
      border-color: var(--active);
    }

    .menu-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 200;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(7, 11, 16, 0.97);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }

    .menu-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .menu-group-title {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .menu-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .contentbar {
      position: relative;
      z-index: 90;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(9, 14, 21, 0.94);
      border-bottom: 1px solid var(--line);
    }

    .contentbar-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .contentbar-scroll {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 2px;
      flex: 1 1 auto;
    }

    .section-divider {
      width: 1px;
      height: 28px;
      background: var(--line);
      flex: 0 0 auto;
    }

    .check-pill {
      --pill-color: var(--active);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.075);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .check-pill:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.13);
    }

    .check-pill input {
      margin: 0;
      accent-color: #ffffff;
    }

    .check-pill.is-on {
      background: var(--pill-color);
      color: #071018;
      border-color: var(--pill-color);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    }

    .check-pill.is-on input {
      accent-color: #071018;
    }

    .check-pill[data-filter-color="spin-offs"] {
      --pill-color: var(--color-spin-offs);
    }

    .check-pill[data-filter-color="books"] {
      --pill-color: var(--color-books);
    }

    .check-pill[data-filter-color="nonref-books"] {
      --pill-color: var(--color-nonref-books);
    }

    .check-pill[data-filter-color="video"] {
      --pill-color: var(--color-video);
    }

    .check-pill[data-filter-color="comics"] {
      --pill-color: var(--color-comics);
    }

    .check-pill[data-filter-color="upcoming"] {
      --pill-color: var(--color-upcoming);
    }

    .check-pill[data-filter-color="upcoming"].is-on {
      background: #FFFFFF;
      color: #071018;
      border-color: #000000;
    }

    .fixed-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--color-main-series);
      background: var(--color-main-series);
      color: #ffffff;
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 13px;
      line-height: 1;
      user-select: none;
      white-space: nowrap;
      opacity: 0.98;
    }

    .fixed-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ffffff;
      flex: 0 0 auto;
    }

    .how-button {
      background: var(--color-main-series);
      border-color: var(--color-main-series);
      color: #ffffff;
      font-weight: 700;
    }

    .how-button:hover {
      background: #e23d50;
      border-color: #e23d50;
    }

    .zoom-display {
      min-width: 58px;
      text-align: center;
      cursor: default;
    }

    .viewer {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.045), transparent 34%),
        #05080d;
      touch-action: none;
      user-select: none;
      cursor: grab;
      padding: 24px;
    }

    .viewer.mode-zoom {
      cursor: zoom-in;
    }

    .viewer.is-panning {
      cursor: grabbing;
    }

    .viewer.is-zoom-dragging {
      cursor: ns-resize;
    }

    .guide-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3000 / 6466;
      margin: 0 auto;
      background: #070b10;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .guide-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .layer-base-current {
      z-index: 0;
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    .layer-base-next {
      z-index: 1;
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    .layer-base-next.is-visible {
      opacity: 1;
    }

    .hidden {
      display: none !important;
    }

    .layer-nonref-books { z-index: 3; }
    .layer-spin-offs { z-index: 4; }
    .layer-books { z-index: 5; }
    .layer-video { z-index: 6; }
    .layer-upcoming { z-index: 7; }
    .layer-comics { z-index: 8; }

    .corner-panel {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 60;
      display: flex;
      gap: 8px;
      align-items: center;
      max-width: calc(100vw - 32px);
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: rgba(7, 11, 16, 0.78);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 70;
      max-width: min(520px, calc(100vw - 32px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(7, 11, 16, 0.92);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      white-space: pre-line;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .language-loader {
      position: fixed;
      inset: 0;
      z-index: 280;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    .language-loader-card {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: min(520px, calc(100vw - 32px));
      padding: 14px 16px;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background: rgba(7, 11, 16, 0.94);
      color: var(--text);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.36);
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      flex: 0 0 auto;
      animation: spin 0.75s linear infinite;
    }

    .language-loader-text {
      white-space: pre-line;
      font-size: 13px;
      line-height: 1.35;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.68);
      backdrop-filter: blur(8px);
    }

    .modal {
      width: min(760px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: rgba(7, 11, 16, 0.98);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .modal-narrow {
      width: min(560px, 100%);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .modal-close {
      flex: 0 0 auto;
      padding: 8px 10px;
      font-size: 16px;
      line-height: 1;
    }

    .modal-body {
      overflow-y: auto;
      padding: 18px 20px 22px;
    }

    .modal-body p {
      margin: 0 0 12px;
      line-height: 1.55;
    }

    .modal-body p:last-child {
      margin-bottom: 0;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .how-list {
      margin: 0;
      padding-left: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .how-list li {
      padding-left: 4px;
      line-height: 1.5;
    }

    .how-list strong {
      display: inline;
      font-weight: 700;
    }

    .about-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .about-link {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.075);
      color: var(--text);
      font-size: 13px;
    }

    .filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mobile-bottombar {
      display: none;
    }

    @media (max-width: 900px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
        padding: 10px;
      }

      .brand {
        width: 100%;
        min-width: 0;
      }

      .title,
      .subtitle {
        white-space: normal;
      }

      .utilitybar {
        width: 100%;
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .select-wrap span {
        display: none;
      }

      .menu-panel {
        left: 0;
        right: auto;
        width: min(340px, calc(100vw - 20px));
      }

      .contentbar {
        display: none;
      }

      button,
      select,
      summary,
      .check-pill,
      .fixed-pill {
        min-height: 36px;
        padding: 9px 11px;
        font-size: 12px;
      }

      .section-divider {
        height: 30px;
      }

      .viewer {
        padding: 14px 14px 74px;
      }

      .corner-panel {
        display: none;
      }

      .toast {
        left: 10px;
        right: 10px;
        bottom: 76px;
        max-width: none;
        text-align: center;
      }

      .modal-overlay {
        padding: 12px;
        align-items: flex-end;
      }

      .modal {
        max-height: calc(100vh - 24px);
        border-radius: 16px;
      }

      .modal-header {
        padding: 16px;
      }

      .modal-title {
        font-size: 20px;
      }

      .modal-body {
        padding: 16px;
      }

      .mobile-bottombar {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;
        z-index: 180;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(7, 11, 16, 0.9);
        backdrop-filter: blur(14px);
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.38);
      }

      .mobile-action-how {
        background: var(--color-main-series);
        border-color: var(--color-main-series);
        color: #ffffff;
        font-weight: 700;
      }

      .mobile-action-filters {
        background: var(--color-filters-mobile);
        border-color: var(--color-filters-mobile);
        color: #071018;
        font-weight: 700;
      }
    }

    @media (max-width: 560px) {
      .fixed-pill {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="title" data-i18n="title">Assassin's Creed Universe Guide</div>
      <div class="subtitle" data-i18n="subtitle">Interactive guide</div>
    </div>

    <div class="utilitybar">
      <label class="select-wrap">
        <span data-i18n="languageLabel">Language</span>
        <select id="language-select" aria-label="Language">
          <option value="en">🇬🇧 English</option>
          <option value="ru">🇷🇺 Русский</option>
          <option value="zh-CN">🇨🇳 简体中文</option>
          <option value="es">🇪🇸 Español</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="pt-BR">🇧🇷 Português-BR</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="ja">🇯🇵 日本語</option>
          <option value="ko">🇰🇷 한국어</option>
          <option value="it">🇮🇹 Italiano</option>
          <option value="pl">🇵🇱 Polski</option>
          <option value="tr">🇹🇷 Türkçe</option>
        </select>
      </label>

      <details class="menu" id="view-menu">
        <summary data-i18n="viewSettings">View</summary>

        <div class="menu-panel">
          <div class="menu-group">
            <div class="menu-group-title" data-i18n="zoomGroup">Zoom</div>
            <div class="menu-row">
              <button id="zoom-out" type="button">−</button>
              <button id="zoom-display" class="zoom-display" type="button">100%</button>
              <button id="zoom-in" type="button">+</button>
            </div>
          </div>

          <div class="menu-group">
            <div class="menu-group-title" data-i18n="fitGroup">Fit</div>
            <div class="menu-row">
              <button id="fit-width" type="button" data-i18n="fitWidth">Fit Width</button>
              <button id="fit-height" type="button" data-i18n="fitHeight">Fit Height</button>
              <button id="reset-view" type="button" data-i18n="resetView">Reset View</button>
            </div>
          </div>

          <div class="menu-group">
            <div class="menu-group-title" data-i18n="navigationGroup">Navigation</div>
            <div class="menu-row">
              <button id="mode-pan" class="active" type="button" data-mode="pan" data-i18n="panMode">Move</button>
              <button id="mode-zoom" type="button" data-mode="zoom" data-i18n="zoomMode">Zoom Drag</button>
            </div>
          </div>
        </div>
      </details>

      <button id="about-open" type="button" data-i18n="aboutButton">About</button>
      <button id="share-view" type="button" data-i18n="share">Share</button>
    </div>
  </header>

  <nav class="contentbar" aria-label="Content filters">
    <div class="contentbar-title" data-i18n="contentFilters">Content filters</div>

    <div class="contentbar-scroll">
      <button id="how-open" class="how-button" type="button" data-i18n="howButton">How to..?</button>

      <div class="section-divider"></div>

      <span class="fixed-pill">
        <span class="fixed-dot"></span>
        <span data-i18n="mainFixed">Main Series</span>
      </span>

      <label class="check-pill" data-filter-color="spin-offs">
        <input type="checkbox" data-layer="spin-offs" checked>
        <span data-i18n="spinOffs">Spin-offs</span>
      </label>

      <label class="check-pill" data-filter-color="books">
        <input type="checkbox" data-layer="books" checked>
        <span data-i18n="books">Books</span>
      </label>

      <label class="check-pill" data-filter-color="nonref-books">
        <input type="checkbox" data-layer="nonref-books" checked>
        <span data-i18n="nonfiction">Non-fiction</span>
      </label>

      <label class="check-pill" data-filter-color="comics">
        <input type="checkbox" data-layer="comics" checked>
        <span data-i18n="comics">Comics</span>
      </label>

      <label class="check-pill" data-filter-color="video">
        <input type="checkbox" data-layer="video" checked>
        <span data-i18n="video">Video</span>
      </label>

      <label class="check-pill" data-filter-color="upcoming">
        <input type="checkbox" data-layer="upcoming" checked>

    const languageLoader = document.querySelector('#language-loader');
    const languageLoaderText = document.querySelector('#language-loader-text');

    const languageSelect = document.querySelector('#language-select');
    const checkboxes = document.querySelectorAll('input[type="checkbox"][data-layer]');
    const filterLayers = document.querySelectorAll('.filter-layer');

    const zoomOutButton = document.querySelector('#zoom-out');
    const zoomInButton = document.querySelector('#zoom-in');
    const zoomDisplayButton = document.querySelector('#zoom-display');
    const fitWidthButton = document.querySelector('#fit-width');
    const fitHeightButton = document.querySelector('#fit-height');
    const resetViewButton = document.querySelector('#reset-view');
    const resetFiltersButton = document.querySelector('#reset-filters');
    const mobileResetFiltersButton = document.querySelector('#mobile-reset-filters');
    const shareButton = document.querySelector('#share-view');
    const modePanButton = document.querySelector('#mode-pan');
    const modeZoomButton = document.querySelector('#mode-zoom');

    const howOpenButton = document.querySelector('#how-open');
    const mobileHowOpenButton = document.querySelector('#mobile-how-open');
    const howModal = document.querySelector('#how-modal');
    const howCloseButton = document.querySelector('#how-close');
    const howTitle = document.querySelector('#how-title');
    const howList = document.querySelector('#how-list');

    const filtersModal = document.querySelector('#filters-modal');
    const mobileFiltersOpenButton = document.querySelector('#mobile-filters-open');
    const filtersCloseButton = document.querySelector('#filters-close');

    const mobileViewOpenButton = document.querySelector('#mobile-view-open');

    const welcomeModal = document.querySelector('#welcome-modal');
    const welcomeTitle = document.querySelector('#welcome-title');
    const welcomeContent = document.querySelector('#welcome-content');
    const welcomeCloseButton = document.querySelector('#welcome-close');
    const welcomeCloseXButton = document.querySelector('#welcome-close-x');
    const welcomeHowButton = document.querySelector('#welcome-how');

    const aboutOpenButton = document.querySelector('#about-open');
    const aboutModal = document.querySelector('#about-modal');
    const aboutCloseButton = document.querySelector('#about-close');
    const aboutTitle = document.querySelector('#about-title');
    const aboutContent = document.querySelector('#about-content');

    let baseGuideWidth = 1000;
    let saveTimer = null;
    let toastTimer = null;
    let loaderTimer = null;

    const state = {
      lang: 'en',
      mode: 'pan',
      zoom: 1,
      filters: {
        'spin-offs': true,
        books: true,
        'nonref-books': true,
        comics: true,
        video: true,
        upcoming: true
      }
    };

    const pointers = new Map();

    let drag = {
      active: false,
      pointerId: null,
      startX: 0,
      startY: 0,
      startScrollLeft: 0,
      startScrollTop: 0,
      startZoom: 1,
      middlePan: false
    };

    let pinch = {
      active: false,
      startDistance: 0,
      startZoom: 1
    };

    function isMobileLayout() {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getMaxZoom() {
      return isMobileLayout() ? 4 : 6;
    }

    function getGuideWidth() {
      return baseGuideWidth * state.zoom;
    }

    function computeBaseGuideWidth() {
      const padding = isMobileLayout() ? 28 : 48;
      baseGuideWidth = Math.max(280, viewer.clientWidth - padding);
    }

    function applyZoom() {
      state.zoom = clamp(state.zoom, 0.35, getMaxZoom());
      guideWrap.style.width = `${getGuideWidth()}px`;
      zoomDisplayButton.textContent = `${Math.round(state.zoom * 100)}%`;
    }

    function saveState() {
      window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => {
        const saved = {
          lang: state.lang,
          mode: state.mode,
          filters: state.filters
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      }, 120);
    }

    function detectPreferredLanguage() {
      const browserLanguages = navigator.languages && navigator.languages.length
        ? navigator.languages
        : [navigator.language || 'en'];

      for (const rawLang of browserLanguages) {
        const lang = String(rawLang).toLowerCase();

        if (lang.startsWith('pt')) return 'pt-BR';
        if (lang.startsWith('zh')) return 'zh-CN';
        if (lang.startsWith('ru')) return 'ru';
        if (lang.startsWith('es')) return 'es';
        if (lang.startsWith('fr')) return 'fr';
        if (lang.startsWith('de')) return 'de';
        if (lang.startsWith('ja')) return 'ja';
        if (lang.startsWith('ko')) return 'ko';
        if (lang.startsWith('it')) return 'it';
        if (lang.startsWith('pl')) return 'pl';
        if (lang.startsWith('tr')) return 'tr';
        if (lang.startsWith('en')) return 'en';
      }

      return 'en';
    }

    function getPointInGuide(clientX, clientY) {
      const viewerRect = viewer.getBoundingClientRect();
      const width = guideWrap.offsetWidth;
      const height = guideWrap.offsetHeight;

      const viewX = clientX - viewerRect.left;
      const viewY = clientY - viewerRect.top;

      const x = viewer.scrollLeft + viewX - guideWrap.offsetLeft;
      const y = viewer.scrollTop + viewY - guideWrap.offsetTop;

      return {
        xRatio: clamp(x / Math.max(1, width), 0, 1),
        yRatio: clamp(y / Math.max(1, height), 0, 1),
        viewX,
        viewY
      };
    }

    function setZoomAt(clientX, clientY, nextZoom) {
      const point = getPointInGuide(clientX, clientY);

      state.zoom = clamp(nextZoom, 0.35, getMaxZoom());
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = guideWrap.offsetLeft + point.xRatio * guideWrap.offsetWidth - point.viewX;
        viewer.scrollTop = guideWrap.offsetTop + point.yRatio * guideWrap.offsetHeight - point.viewY;
      });
    }

    function setZoomAtCenter(nextZoom) {
      const rect = viewer.getBoundingClientRect();
      setZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, nextZoom);
    }

    function fitWidth() {
      computeBaseGuideWidth();
      state.zoom = 1;
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = Math.max(0, (viewer.scrollWidth - viewer.clientWidth) / 2);
        viewer.scrollTop = 0;
      });
    }

    function fitHeight() {
      computeBaseGuideWidth();

      const availableHeight = Math.max(200, viewer.clientHeight - 32);
      const heightAtZoomOne = baseGuideWidth * (BASE_HEIGHT / BASE_WIDTH);

      state.zoom = clamp(availableHeight / heightAtZoomOne, 0.35, getMaxZoom());
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = Math.max(0, (viewer.scrollWidth - viewer.clientWidth) / 2);
        viewer.scrollTop = 0;
      });
    }

    function resetView() {
      fitWidth();
    }

    function showToast(message, duration = 1600) {
      window.clearTimeout(toastTimer);

      toast.textContent = message;
      toast.classList.add('visible');

      toastTimer = window.setTimeout(() => {
        toast.classList.remove('visible');
      }, duration);
    }

    function showLanguageLoader(fromLang, toLang) {
      const fromDictionary = UI[fromLang] || UI.en;
      const toDictionary = UI[toLang] || UI.en;

      languageLoaderText.textContent = `${fromDictionary.switching}\n${toDictionary.switching}`;
      languageLoader.classList.remove('hidden');

      window.clearTimeout(loaderTimer);
      loaderTimer = window.setTimeout(() => {
        languageLoader.classList.add('hidden');
      }, 8000);
    }

    function hideLanguageLoader() {
      window.clearTimeout(loaderTimer);
      languageLoader.classList.add('hidden');
    }

    function showLanguageSwitchNotice(fromLang, toLang) {
      const fromDictionary = UI[fromLang] || UI.en;
      const toDictionary = UI[toLang] || UI.en;

      if (fromLang === toLang) {
        return;
      }

      showToast(`${fromDictionary.switching}\n${toDictionary.switching}`, 2000);
    }

    function renderHowModal() {
      const dictionary = UI[state.lang] || UI.en;
      const how = dictionary.how || UI.en.how;

      howTitle.textContent = how.title;
      howList.innerHTML = '';

      how.items.forEach((item) => {
        const li = document.createElement('li');
        const strong = document.createElement('strong');

        strong.textContent = `${item.title} `;

        li.appendChild(strong);
        li.append(item.text);
        howList.appendChild(li);
      });
    }

    function openHowModal() {
      renderHowModal();
      howModal.classList.remove('hidden');
    }

    function closeHowModal() {
      howModal.classList.add('hidden');
    }

    function renderWelcomeModal() {
      const dictionary = UI[state.lang] || UI.en;
      const welcome = dictionary.welcome || UI.en.welcome;

      welcomeTitle.textContent = welcome.title;
      welcomeContent.innerHTML = '';

      welcome.paragraphs.forEach((text) => {
        const p = document.createElement('p');
        p.textContent = text;
        welcomeContent.appendChild(p);
      });

      welcomeCloseButton.textContent = welcome.close;
      welcomeHowButton.textContent = welcome.openHow;
    }

    function openWelcomeModal() {
      renderWelcomeModal();
      welcomeModal.classList.remove('hidden');
    }

    function closeWelcomeModal(markSeen = true) {
      welcomeModal.classList.add('hidden');

      if (markSeen) {
        localStorage.setItem(WELCOME_KEY, '1');
      }
    }

    function maybeShowWelcome() {
      if (!localStorage.getItem(WELCOME_KEY)) {
        window.setTimeout(openWelcomeModal, 450);
      }
    }

    function renderAboutModal() {
      const dictionary = UI[state.lang] || UI.en;
      const about = dictionary.about || UI.en.about;

      aboutTitle.textContent = about.title;
      aboutContent.innerHTML = '';

      about.paragraphs.forEach((text) => {
        const p = document.createElement('p');
        p.textContent = text;
        aboutContent.appendChild(p);
      });
    }

    function openAboutModal() {
      renderAboutModal();
      aboutModal.classList.remove('hidden');
    }

    function closeAboutModal() {
      aboutModal.classList.add('hidden');
    }

    function openFiltersModal() {
      filtersModal.classList.remove('hidden');
    }

    function closeFiltersModal() {
      filtersModal.classList.add('hidden');
    }

    function switchBaseLayer(src, fromLang, toLang, shouldNotify) {
      if (baseLayer.getAttribute('src') === src) {
        hideLanguageLoader();
        return;
      }

      if (shouldNotify) {
        showLanguageLoader(fromLang, toLang);
      }

      baseLayerNext.onload = () => {
        requestAnimationFrame(() => {
          baseLayerNext.classList.remove('hidden');

          requestAnimationFrame(() => {
            baseLayerNext.classList.add('is-visible');

            window.setTimeout(() => {
              baseLayer.src = src;
              baseLayerNext.classList.remove('is-visible');
              baseLayerNext.classList.add('hidden');
              baseLayerNext.removeAttribute('src');
              hideLanguageLoader();
            }, 300);
          });
        });
      };

      baseLayerNext.onerror = () => {
        baseLayer.src = src;
        baseLayerNext.classList.remove('is-visible');
        baseLayerNext.classList.add('hidden');
        baseLayerNext.removeAttribute('src');
        hideLanguageLoader();
      };

      baseLayerNext.src = src;
    }

    function setLanguage(lang, options = {}) {
      const shouldNotify = options.notify === true;

      if (!BASE_BY_LANG[lang]) {
        lang = 'en';
      }

      const previousLang = state.lang;
      state.lang = lang;
      document.documentElement.lang = lang;
      languageSelect.value = lang;

      const dictionary = UI[lang] || UI.en;

      document.querySelectorAll('[data-i18n]').forEach((element) => {
        const key = element.dataset.i18n;

        if (dictionary[key]) {
          element.textContent = dictionary[key];
        }
      });

      if (shouldNotify) {
        showLanguageSwitchNotice(previousLang, lang);
      }

      switchBaseLayer(BASE_BY_LANG[lang], previousLang, lang, shouldNotify);

      renderHowModal();
      renderWelcomeModal();
      renderAboutModal();
      saveState();
    }

    function setMode(mode) {
      state.mode = mode;

      viewer.classList.toggle('mode-pan', mode === 'pan');
      viewer.classList.toggle('mode-zoom', mode === 'zoom');

      modePanButton.classList.toggle('active', mode === 'pan');
      modeZoomButton.classList.toggle('active', mode === 'zoom');

      saveState();
    }

    function shouldUnloadHiddenLayers() {
      return isMobileLayout();
    }

    function ensureLayerLoaded(layer) {
      if (!layer.getAttribute('src')) {
        layer.src = layer.dataset.src;
      }
    }

    function unloadLayer(layer) {
      if (shouldUnloadHiddenLayers()) {
        layer.removeAttribute('src');
      }
    }

    function applyFilters() {
      checkboxes.forEach((checkbox) => {
        const key = checkbox.dataset.layer;
        const visible = state.filters[key] !== false;

        checkbox.checked = visible;

        const pill = checkbox.closest('.check-pill');

        if (pill) {
          pill.classList.toggle('is-on', visible);
        }
      });

      filterLayers.forEach((layer) => {
        const key = layer.dataset.layerName;
        const visible = state.filters[key] !== false;

        layer.classList.toggle('hidden', !visible);

        if (visible) {
          ensureLayerLoaded(layer);
        } else {
          unloadLayer(layer);
        }
      });

      saveState();
    }

    function resetFilters() {
      FILTERS.forEach((key) => {
        state.filters[key] = true;
      });

      applyFilters();
    }

    function getShareUrl() {
      const url = new URL(window.location.href);

      url.search = '';
      url.searchParams.set('lang', state.lang);

      if (state.mode !== 'pan') {
        url.searchParams.set('mode', state.mode);
      }

      FILTERS.forEach((key) => {
        if (state.filters[key] === false) {
          url.searchParams.set(key, '0');
        }
      });

      return url.toString();
    }

    async function shareView() {
      const url = getShareUrl();
      const dictionary = UI[state.lang] || UI.en;

      try {
        await navigator.clipboard.writeText(url);
        showToast(dictionary.copied);
      } catch (error) {
        window.prompt(dictionary.copyFallback, url);
      }
    }

    function readSavedState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

        if (!saved) {
          return false;
        }

        if (BASE_BY_LANG[saved.lang]) {
          state.lang = saved.lang;
        }

        if (saved.mode === 'pan' || saved.mode === 'zoom') {
          state.mode = saved.mode;
        }

        if (saved.filters) {
          FILTERS.forEach((key) => {
            if (typeof saved.filters[key] === 'boolean') {
              state.filters[key] = saved.filters[key];
            }
          });
        }

        return true;
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
        return false;
      }
    }

    function readUrlState() {
      const params = new URLSearchParams(window.location.search);
      let hasState = false;

      const lang = params.get('lang');
      const mode = params.get('mode');

      if (BASE_BY_LANG[lang]) {
        state.lang = lang;
        hasState = true;
      }

      if (mode === 'pan' || mode === 'zoom') {
        state.mode = mode;
        hasState = true;
      }

      FILTERS.forEach((key) => {
        if (params.get(key) === '0') {
          state.filters[key] = false;
          hasState = true;
        }

        if (params.get(key) === '1') {
          state.filters[key] = true;
          hasState = true;
        }
      });

      return hasState;
    }

    function getPointerDistance(items) {
      const a = items[0];
      const b = items[1];

      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    function getPointerCenter(items) {
      const a = items[0];
      const b = items[1];

      return {
        x: (a.clientX + b.clientX) / 2,
        y: (a.clientY + b.clientY) / 2
      };
    }

    function startPinch() {
      const items = Array.from(pointers.values());

      if (items.length < 2) {
        return;
      }

      pinch.active = true;
      pinch.startDistance = getPointerDistance(items);
      pinch.startZoom = state.zoom;
      drag.active = false;

      viewer.classList.remove('is-panning');
      viewer.classList.remove('is-zoom-dragging');
    }

    function stopInteraction(event) {
      if (event && pointers.has(event.pointerId)) {
        pointers.delete(event.pointerId);
      }

      if (drag.active && event && drag.pointerId === event.pointerId) {
        drag.active = false;
        drag.pointerId = null;
        drag.middlePan = false;
      }

      if (pointers.size < 2) {
        pinch.active = false;
      }

      if (pointers.size === 0) {
        viewer.classList.remove('is-panning');
        viewer.classList.remove('is-zoom-dragging');
      }
    }

    viewer.addEventListener('pointerdown', (event) => {
      const isMouse = event.pointerType === 'mouse';
      const isLeftButton = event.button === 0;
      const isMiddleButton = event.button === 1;

      if (isMouse && !isLeftButton && !isMiddleButton) {
        return;
      }

      event.preventDefault();

      viewer.setPointerCapture(event.pointerId);

      pointers.set(event.pointerId, {
        clientX: event.clientX,
        clientY: event.clientY
      });

      if (pointers.size === 2) {
        startPinch();
        return;
      }

      drag.active = true;
      drag.pointerId = event.pointerId;
      drag.startX = event.clientX;
      drag.startY = event.clientY;
      drag.startScrollLeft = viewer.scrollLeft;
      drag.startScrollTop = viewer.scrollTop;
      drag.startZoom = state.zoom;
      drag.middlePan = isMiddleButton;

      viewer.classList.toggle('is-panning', state.mode === 'pan' || drag.middlePan);
      viewer.classList.toggle('is-zoom-dragging', state.mode === 'zoom' && !drag.middlePan);
    });

    viewer.addEventListener('pointermove', (event) => {
      if (!pointers.has(event.pointerId)) {
        return;
      }

      pointers.set(event.pointerId, {
        clientX: event.clientX,
        clientY: event.clientY
      });

      if (pointers.size >= 2 && pinch.active) {
        const items = Array.from(pointers.values()).slice(0, 2);
        const distance = getPointerDistance(items);
        const center = getPointerCenter(items);
        const ratio = distance / Math.max(1, pinch.startDistance);

        setZoomAt(center.x, center.y, pinch.startZoom * ratio);
        return;
      }

      if (!drag.active || drag.pointerId !== event.pointerId) {
        return;
      }

      const deltaX = event.clientX - drag.startX;
      const deltaY = event.clientY - drag.startY;

      if (state.mode === 'pan' || drag.middlePan) {
        viewer.scrollLeft = drag.startScrollLeft - deltaX;
        viewer.scrollTop = drag.startScrollTop - deltaY;
        return;
      }

      const zoomDelta = (deltaX - deltaY) * 0.003;
      setZoomAt(event.clientX, event.clientY, drag.startZoom + zoomDelta);
    });

    viewer.addEventListener('pointerup', stopInteraction);
    viewer.addEventListener('pointercancel', stopInteraction);
    viewer.addEventListener('lostpointercapture', stopInteraction);

    viewer.addEventListener('wheel', (event) => {
      if (event.ctrlKey || event.metaKey) {
        event.preventDefault();

        const zoomFactor = Math.exp(-event.deltaY * 0.001);
        setZoomAt(event.clientX, event.clientY, state.zoom * zoomFactor);
      }
    }, { passive: false });

    viewer.addEventListener('mousedown', (event) => {
      if (event.button === 1) {
        event.preventDefault();
      }
    });

    viewer.addEventListener('auxclick', (event) => {
      if (event.button === 1) {
        event.preventDefault();
      }
    });

    document.addEventListener('click', (event) => {
      if (viewMenu && viewMenu.open && !viewMenu.contains(event.target) && event.target !== mobileViewOpenButton) {
        viewMenu.open = false;
      }
    });

    languageSelect.addEventListener('change', () => {
      setLanguage(languageSelect.value, { notify: true });
    });

    checkboxes.forEach((checkbox) => {
      checkbox.addEventListener('change', () => {
        state.filters[checkbox.dataset.layer] = checkbox.checked;
        applyFilters();
      });
    });

    zoomOutButton.addEventListener('click', () => {
      setZoomAtCenter(state.zoom - 0.25);
    });

    zoomInButton.addEventListener('click', () => {
      setZoomAtCenter(state.zoom + 0.25);
    });

    zoomDisplayButton.addEventListener('click', resetView);
    fitWidthButton.addEventListener('click', fitWidth);
    fitHeightButton.addEventListener('click', fitHeight);
    resetViewButton.addEventListener('click', resetView);
    resetFiltersButton.addEventListener('click', resetFilters);
    mobileResetFiltersButton.addEventListener('click', resetFilters);
    shareButton.addEventListener('click', shareView);

    modePanButton.addEventListener('click', () => {
      setMode('pan');
    });

    modeZoomButton.addEventListener('click', () => {
      setMode('zoom');
    });

    howOpenButton.addEventListener('click', openHowModal);
    mobileHowOpenButton.addEventListener('click', openHowModal);
    howCloseButton.addEventListener('click', closeHowModal);

    mobileFiltersOpenButton.addEventListener('click', openFiltersModal);
    filtersCloseButton.addEventListener('click', closeFiltersModal);

    mobileViewOpenButton.addEventListener('click', () => {
      viewMenu.open = !viewMenu.open;
    });

    welcomeCloseButton.addEventListener('click', () => closeWelcomeModal(true));
    welcomeCloseXButton.addEventListener('click', () => closeWelcomeModal(true));

    welcomeHowButton.addEventListener('click', () => {
      closeWelcomeModal(true);
      openHowModal();
    });

    aboutOpenButton.addEventListener('click', openAboutModal);
    aboutCloseButton.addEventListener('click', closeAboutModal);

    howModal.addEventListener('click', (event) => {
      if (event.target === howModal) {
        closeHowModal();
      }
    });

    filtersModal.addEventListener('click', (event) => {
      if (event.target === filtersModal) {
        closeFiltersModal();
      }
    });

    welcomeModal.addEventListener('click', (event) => {
      if (event.target === welcomeModal) {
        closeWelcomeModal(true);
      }
    });

    aboutModal.addEventListener('click', (event) => {
      if (event.target === aboutModal) {
        closeAboutModal();
      }
    });

    window.addEventListener('keydown', (event) => {
      const tag = document.activeElement.tagName.toLowerCase();

      if (event.key === 'Escape') {
        if (!howModal.classList.contains('hidden')) closeHowModal();
        if (!filtersModal.classList.contains('hidden')) closeFiltersModal();
        if (!welcomeModal.classList.contains('hidden')) closeWelcomeModal(true);
        if (!aboutModal.classList.contains('hidden')) closeAboutModal();
        return;
      }

      if (tag === 'input' || tag === 'button' || tag === 'select') {
        return;
      }

      if (event.key === '+' || event.key === '=') {
        event.preventDefault();
        setZoomAtCenter(state.zoom + 0.25);
      }

      if (event.key === '-') {
        event.preventDefault();
        setZoomAtCenter(state.zoom - 0.25);
      }

      if (event.key === '0') {
        event.preventDefault();
        resetView();
      }

      if (event.key.toLowerCase() === 'f') {
        event.preventDefault();
        fitWidth();
      }

      if (event.key.toLowerCase() === 'h') {
        event.preventDefault();
        fitHeight();
      }

      if (event.key.toLowerCase() === 'z') {
        event.preventDefault();
        setMode(state.mode === 'pan' ? 'zoom' : 'pan');
      }

      if (event.key.toLowerCase() === 'r') {
        event.preventDefault();
        resetFilters();
      }
    });

    window.addEventListener('resize', () => {
      const oldWidth = guideWrap.offsetWidth;
      const oldHeight = guideWrap.offsetHeight;

      const centerX = viewer.scrollLeft + viewer.clientWidth / 2 - guideWrap.offsetLeft;
      const centerY = viewer.scrollTop + viewer.clientHeight / 2 - guideWrap.offsetTop;

      const xRatio = clamp(centerX / Math.max(1, oldWidth), 0, 1);
      const yRatio = clamp(centerY / Math.max(1, oldHeight), 0, 1);

      computeBaseGuideWidth();
      applyZoom();

      requestAnimationFrame(() => {
        viewer.scrollLeft = guideWrap.offsetLeft + xRatio * guideWrap.offsetWidth - viewer.clientWidth / 2;
        viewer.scrollTop = guideWrap.offsetTop + yRatio * guideWrap.offsetHeight - viewer.clientHeight / 2;
      });
    });

    baseLayer.addEventListener('error', () => {
      console.warn(`Base layer not found: ${baseLayer.getAttribute('src')}`);
    });

    filterLayers.forEach((img) => {
      img.addEventListener('error', () => {
        console.warn(`Layer not found: ${img.dataset.src}`);
      });
    });

    const savedApplied = readSavedState();
    const urlApplied = readUrlState();

    if (!savedApplied && !urlApplied) {
      state.lang = detectPreferredLanguage();
    }

    computeBaseGuideWidth();
    applyZoom();
    setLanguage(state.lang);
    setMode(state.mode);
    applyFilters();
    renderHowModal();
    renderWelcomeModal();
    renderAboutModal();
    fitWidth();
    maybeShowWelcome();
